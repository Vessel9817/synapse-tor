name: element
services:
  nginx:
    container_name: element
    depends_on:
      synapse:
        condition: service_healthy
    healthcheck:
      test: [
        'CMD-SHELL',
        'wget -q --spider http://127.0.0.1:80/config.json'
      ]
      timeout: 5s
    image: vectorim/element-web:v1.12.12@sha256:3f031bba174a062d21dcb506662031ce717586c05c03d018063c19470941ac70
    restart: unless-stopped
    volumes:
      - type: bind
        source: ./element-config.json
        target: /app/config.json
      # Element overwrites default.conf and fails when we make it read-only
      - type: bind
        source: /dev/null
        target: /etc/nginx/conf.d/default.conf
      - type: bind
        source: ./server.conf
        target: /etc/nginx/conf.d/server.conf
    networks:
      nginx:
        # Aligns with onion-website
        ipv4_address: 10.5.0.2
  postgres:
    container_name: postgres
    image: postgres:14.22-trixie@sha256:705a5d5b5836f3fcba0d02c4d281e6a7dd9ed2dd4078640f08a1e1e9896e097d
    healthcheck:
      test: [
        'CMD',
        'pg_isready', '-q', '-t', '3'
      ]
      start_period: 5s
      interval: 5s
    restart: unless-stopped
    shm_size: 128mb
    volumes:
      - type: bind
        source: ./postgres/data
        target: /var/lib/postgresql/data
    environment:
      POSTGRES_DB_FILE: /run/secrets/postgres/db.txt
      POSTGRES_USER_FILE: /run/secrets/postgres/user.txt
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres/password.txt
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --locale=C
    secrets:
      - source: postgres
        target: /run/secrets/postgres/
    networks:
      nginx:
        ipv4_address: 10.5.0.4
  synapse:
    container_name: synapse
    image: matrixdotorg/synapse:v1.149.1@sha256:dcab93b1183b296b3bc50767813e4a2337a7cb4a9b89a5e6af5fe9b69a43618c
    links:
      - postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - type: bind
        source: ./synapse
        target: /data
    networks:
      nginx:
        ipv4_address: 10.5.0.3
  tor:
    extends:
      service: tor
      file: ./onion-website/docker-compose.yml
    depends_on:
      nginx:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./tor/torrc
        target: /etc/tor/torrc
      - type: bind
        source: ./onion-website/src/tor/secrets/
        # Path defined by torrc
        target: /var/lib/tor/website/
    networks:
      nginx:
        ipv4_address: 10.5.0.5
  prometheus:
    container_name: prometheus
    image: prom/prometheus:v3.10.0-distroless@sha256:4d2174874988fe0d8356fa5c799210767661a2ffce6bb03cdc64306f6579d7b9
    restart: unless-stopped
    depends_on:
      synapse:
        condition: service_healthy
        required: false
    healthcheck:
      test: [
        "CMD",
        "promtool", "check", "healthy"
      ]
      timeout: 3s
    volumes:
      - type: bind
        source: ./prometheus/prometheus.yml
        target: /etc/prometheus/prometheus.yml
      - type: volume
        source: prometheus
        target: /prometheus/
    networks:
      nginx:
        ipv4_address: 10.5.0.253
      metrics:
        ipv4_address: 10.6.0.2
  grafana:
    container_name: grafana
    image: grafana/grafana:12.4.1@sha256:e932bd6ed0e026595b08483cd0141e5103e1ab7ff8604839ff899b8dc54cabcb
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
        required: false
    ports:
      - ':3000'
    # https://grafana.com/docs/grafana/latest/setup-grafana/configure-grafana/#override-configuration-with-environment-variables
    environment:
      GF_SECURITY_ADMIN_USER: $$__file{/run/secrets/admin_user.txt}
      GF_SECURITY_ADMIN_PASSWORD: $$__file{/run/secrets/admin_pass.txt}
      GF_SECURITY_ADMIN_EMAIL: $$__file{/run/secrets/admin_email.txt}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning/
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/synapse.json
      GF_ANALYTICS_REPORTING_ENABLED: false # Anonymous usage statistics
    volumes:
      - type: bind
        source: ./grafana/datasources.yml
        target: /etc/grafana/provisioning/datasources/datasources.yml
        read_only: true
      - type: bind
        source: ./grafana/synapse.json
        target: /etc/grafana/provisioning/dashboards/synapse.json
        read_only: true
      - type: volume
        source: grafana-storage
        target: /var/lib/grafana/
    secrets:
      - source: grafana
        target: /run/secrets/
    networks:
      metrics:
        ipv4_address: 10.6.0.3
  nginx-debug:
    extends:
      service: nginx-debug
      file: ./onion-website/docker-compose.yml
secrets:
  postgres:
    file: ./postgres/config/
  grafana:
    file: ./grafana/secrets/
volumes:
  tor-data:
  prometheus:
  grafana-storage:
networks:
  tor:
    ipam:
      config:
        # Aligns with onion-website
        - subnet: 10.5.3.0/24 # 10.5.3.*
          gateway: 10.5.3.1
  nginx:
    ipam:
      config:
        # Aligns with onion-website
        - subnet: 10.5.0.0/24 # 10.5.0.*
          gateway: 10.5.0.1
  metrics:
    ipam:
      config:
        - subnet: 10.6.0.0/24 # 10.6.0.*
          gateway: 10.6.0.1
