name: element
services:
  nginx:
    container_name: element
    depends_on:
      synapse:
        condition: service_started
        # condition: service_healthy
    image: vectorim/element-web:v1.12.11@sha256:dd6696825002350e3fc7f6110ab9b4ebdf32b5c489fb195b74cff4cb1b87220a
    restart: unless-stopped
    volumes:
      - type: bind
        source: ./element-config.json
        target: /app/config.json
      # Element overwrites default.conf and fails when we make it read-only
      - type: bind
        source: /dev/null
        target: /etc/nginx/conf.d/default.conf
      - type: bind
        source: ./server.conf
        target: /etc/nginx/conf.d/server.conf
    networks:
      nginx:
        ipv4_address: 10.5.0.2
  postgres:
    container_name: postgres
    image: postgres:14.21-trixie@sha256:b964c3211689ffe50cc65235ea338717520954dcf6ecd4d76bf887eba3cbc91f
    restart: unless-stopped
    shm_size: 128mb
    volumes:
      - type: bind
        source: ./postgres/data
        target: /var/lib/postgresql/data
    environment:
      POSTGRES_DB_FILE: /run/secrets/postgres/db.txt
      POSTGRES_USER_FILE: /run/secrets/postgres/user.txt
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres/password.txt
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --locale=C
    secrets:
      - source: postgres
        target: /run/secrets/postgres/
    networks:
      nginx:
        ipv4_address: 10.5.0.4
  synapse:
    container_name: synapse
    image: matrixdotorg/synapse:v1.148.0@sha256:e7f0bdf2b570de33b4f2c61126bcc4e41e4bd840b9a57726353231812f644571
    links:
      - postgres
    depends_on:
      postgres:
        condition: service_started
        # condition: service_healthy
    restart: unless-stopped
    volumes:
      - type: bind
        source: ./synapse
        target: /data
    networks:
      nginx:
        ipv4_address: 10.5.0.3
  tor-init:
    extends:
      service: tor-init
      file: ./onion-website/docker-compose.yml
  tor:
    extends:
      service: tor
      file: ./onion-website/docker-compose.yml
    depends_on:
      nginx:
        condition: service_started
        # condition: service_healthy
    build:
      context: ./tor
      dockerfile: ../onion-website/src/tor/Dockerfile
  vanguards:
    extends:
      service: vanguards
      file: ./onion-website/docker-compose.yml
  nginx-debug:
    extends:
      service: nginx-debug
      file: ./onion-website/docker-compose.yml
secrets:
  postgres:
    file: ./postgres/config/
volumes:
  tor-data:
networks:
  tor:
    enable_ipv4: true
    enable_ipv6: false
  nginx:
    ipam:
      config:
        - subnet: 10.5.0.0/24 # 10.5.0.*
          gateway: 10.5.0.1
